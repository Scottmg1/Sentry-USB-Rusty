name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: ARM64 (Pi 3/4/5/Zero2W 64-bit)
            target: aarch64-unknown-linux-gnu
            linker: aarch64-linux-gnu-gcc
            gcc: gcc-aarch64-linux-gnu
            artifact: sentryusb-linux-arm64
            artifact_suffix: linux-arm64
          - name: ARMv7 (Pi 2/3/Zero2W 32-bit)
            target: armv7-unknown-linux-gnueabihf
            linker: arm-linux-gnueabihf-gcc
            gcc: gcc-arm-linux-gnueabihf
            artifact: sentryusb-linux-armv7
            artifact_suffix: linux-armv7
          - name: ARMv6 (Pi Zero W/1)
            target: arm-unknown-linux-gnueabihf
            linker: arm-linux-gnueabihf-gcc
            gcc: gcc-arm-linux-gnueabihf
            artifact: sentryusb-linux-armv6
            artifact_suffix: linux-armv6
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.gcc }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Invalidate the target cache whenever Cargo.lock OR the inputs
          # to the embedded frontend change. rust-embed's rerun-if-changed
          # is unreliable across cache restores, so any change that ends up
          # in crates/sentryusb/static must force a clean cargo rebuild.
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock', 'web/src/**', 'web/package-lock.json', 'web/package.json', 'web/index.html', 'web/vite.config.*', 'web/tsconfig*.json') }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          set -e
          cd web
          npm ci
          npm run build
          cd ..
          # Verify the build actually produced an HTML entry point. If
          # it didn't, refuse to continue rather than ship a binary with
          # an empty embedded UI.
          if [ ! -s "web/dist/index.html" ]; then
            echo "::error::web/dist/index.html missing or empty after npm run build"
            exit 1
          fi
          rm -rf crates/sentryusb/static
          cp -r web/dist crates/sentryusb/static
          # Sanity-check the embedded dir before handing off to cargo.
          if [ ! -s "crates/sentryusb/static/index.html" ] || [ -z "$(ls -A crates/sentryusb/static/assets 2>/dev/null)" ]; then
            echo "::error::crates/sentryusb/static is empty or missing assets after copy"
            exit 1
          fi
          echo "Frontend rebuilt; embedded $(ls crates/sentryusb/static/assets | wc -l) asset(s)"

      - name: Validate Cargo.lock
        # cargo fetch resolves the lockfile against Cargo.toml and exits
        # non-zero if Cargo.lock is genuinely broken. This catches lockfile
        # corruption before the much slower cargo build step.
        run: cargo fetch --target ${{ matrix.target }}

      - name: Build release binaries (sentryusb + cttseraser)
        run: |
          cargo build --release --target ${{ matrix.target }} -p sentryusb
          cargo build --release --target ${{ matrix.target }} -p cttseraser
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: ${{ matrix.linker }}
          CARGO_TARGET_ARM_UNKNOWN_LINUX_GNUEABIHF_LINKER: ${{ matrix.linker }}

      - name: Package binaries
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/sentryusb release/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/cttseraser release/cttseraser-${{ matrix.artifact_suffix }}
          ls -lh release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-bundle
          path: release/*

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Ensure static dir exists
        run: |
          mkdir -p crates/sentryusb/static
          echo '<!DOCTYPE html><html><body>test</body></html>' > crates/sentryusb/static/index.html
      - name: Run tests
        run: cargo test --workspace

  release:
    name: Create Release
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: release/
          merge-multiple: true

      - name: List release files
        run: ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
