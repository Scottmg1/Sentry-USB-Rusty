name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: ARM64 (Pi 3/4/5/Zero2W 64-bit)
            target: aarch64-unknown-linux-gnu
            linker: aarch64-linux-gnu-gcc
            gcc: gcc-aarch64-linux-gnu
            artifact: sentryusb-linux-arm64
            artifact_suffix: linux-arm64
          - name: ARMv7 (Pi 2/3/Zero2W 32-bit)
            target: armv7-unknown-linux-gnueabihf
            linker: arm-linux-gnueabihf-gcc
            gcc: gcc-arm-linux-gnueabihf
            artifact: sentryusb-linux-armv7
            artifact_suffix: linux-armv7
          - name: ARMv6 (Pi Zero W/1)
            target: arm-unknown-linux-gnueabihf
            linker: arm-linux-gnueabihf-gcc
            gcc: gcc-arm-linux-gnueabihf
            artifact: sentryusb-linux-armv6
            artifact_suffix: linux-armv6
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.gcc }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build
          cd ..
          rm -rf crates/sentryusb/static
          cp -r web/dist crates/sentryusb/static
          echo "Frontend rebuilt from current source"

      - name: Build release binaries (sentryusb + cttseraser)
        run: |
          cargo build --release --target ${{ matrix.target }} -p sentryusb
          cargo build --release --target ${{ matrix.target }} -p cttseraser
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: ${{ matrix.linker }}
          CARGO_TARGET_ARM_UNKNOWN_LINUX_GNUEABIHF_LINKER: ${{ matrix.linker }}

      - name: Package binaries
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/sentryusb release/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/cttseraser release/cttseraser-${{ matrix.artifact_suffix }}
          ls -lh release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-bundle
          path: release/*

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Ensure static dir exists
        run: |
          mkdir -p crates/sentryusb/static
          echo '<!DOCTYPE html><html><body>test</body></html>' > crates/sentryusb/static/index.html
      - name: Run tests
        run: cargo test --workspace

  release:
    name: Create Release
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: release/
          merge-multiple: true

      - name: List release files
        run: ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
