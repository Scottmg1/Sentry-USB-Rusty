name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: ARM64 (Pi 3/4/5/Zero2W 64-bit)
            target: aarch64-unknown-linux-gnu
            linker: aarch64-linux-gnu-gcc
            gcc: gcc-aarch64-linux-gnu
            artifact: sentryusb-linux-arm64
          - name: ARMv7 (Pi 2/3/Zero2W 32-bit)
            target: armv7-unknown-linux-gnueabihf
            linker: arm-linux-gnueabihf-gcc
            gcc: gcc-arm-linux-gnueabihf
            artifact: sentryusb-linux-armv7
          - name: ARMv6 (Pi Zero W/1)
            target: arm-unknown-linux-gnueabihf
            linker: arm-linux-gnueabihf-gcc
            gcc: gcc-arm-linux-gnueabihf
            artifact: sentryusb-linux-armv6
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.gcc }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Ensure frontend exists
        run: |
          if [ -d "crates/sentryusb/static/assets" ]; then
            echo "Frontend already present"
          else
            echo "Using placeholder frontend"
            mkdir -p crates/sentryusb/static
            echo '<!DOCTYPE html><html><body>Frontend not bundled</body></html>' > crates/sentryusb/static/index.html
          fi

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: ${{ matrix.linker }}
          CARGO_TARGET_ARM_UNKNOWN_LINUX_GNUEABIHF_LINKER: ${{ matrix.linker }}

      - name: Package binary
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/sentryusb release/${{ matrix.artifact }}
          ls -lh release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Ensure static dir exists
        run: |
          mkdir -p crates/sentryusb/static
          echo '<!DOCTYPE html><html><body>test</body></html>' > crates/sentryusb/static/index.html
      - name: Run tests
        run: cargo test --workspace

  release:
    name: Create Release
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: release/
          merge-multiple: true

      - name: List release files
        run: ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
