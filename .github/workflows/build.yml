name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-arm64:
    name: Build ARM64 (Pi 3/4/5/Zero2W)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-arm64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build frontend
        run: |
          # Copy frontend from Sentry-USB if available, otherwise use placeholder
          if [ -d "crates/sentryusb/static/assets" ]; then
            echo "Frontend already present"
          else
            echo "Using placeholder frontend"
            mkdir -p crates/sentryusb/static
            echo '<!DOCTYPE html><html><body>Frontend not bundled</body></html>' > crates/sentryusb/static/index.html
          fi

      - name: Build release binary
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary
        run: |
          mkdir -p release
          cp target/aarch64-unknown-linux-gnu/release/sentryusb release/sentryusb-linux-arm64
          ls -lh release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentryusb-linux-arm64
          path: release/sentryusb-linux-arm64

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Ensure static dir exists
        run: |
          mkdir -p crates/sentryusb/static
          echo '<!DOCTYPE html><html><body>test</body></html>' > crates/sentryusb/static/index.html
      - name: Run tests
        run: cargo test --workspace

  release:
    name: Create Release
    needs: [build-arm64, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: sentryusb-linux-arm64
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
